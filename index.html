<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğa Koruyucuları - Sıfır Atık</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- TensorFlow.js ve Teachable Machine Kütüphaneleri -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- 1. ANA SAYFA VE FOTOĞRAF ÇEKME EKRANI -->
        <section id="home-screen" class="screen active">
            <div class="card">
                <h1 class="title">Doğa Koruyucuları</h1>
                <p class="description">Geri dönüşüm malzemelerini fotoğraflayarak sıfır atık projesine katkı sağlayın.</p>
                
                <!-- HTML5 Native Kamera Tetikleyici -->
                <input type="file" accept="image/*" capture="environment" id="camera-input" class="hidden">
                
                <button id="start-btn" class="btn btn-primary" onclick="triggerCamera()">
                    <span class="icon">📸</span> Atığı Fotoğrafla
                </button>
                
                <p id="loading-text" class="hidden">Yapay Zeka Atığı İnceliyor...</p>
                <p id="error-text" class="error hidden"></p>
            </div>
        </section>

        <!-- Analiz İçin Gizli Resim Alanı -->
        <img id="preview-image" class="hidden" alt="Analiz Edilen Görüntü">

        <!-- 2. SONUÇ EKRANI -->
        <section id="result-screen" class="screen hidden">
            <div class="card result-card">
                <h2>Tanıma Sonucu</h2>
                
                <div class="snapshot-container">
                    <img id="snapshot-img" src="" alt="Çekilen Atık Fotoğrafı">
                </div>

                <div class="primary-result">
                    <h3 id="best-match-class">Tespit Edilen Atık: -</h3>
                    <p id="best-match-prob" class="confidence">Güven Oranı: %0</p>
                </div>

                <div class="thank-you-box" id="feedback-box">
                    Sıfır atık projesine katkınızdan dolayı teşekkür ederiz 🌍
                </div>

                <div class="all-results">
                    <h4>Eşleşme Detayları</h4>
                    <div id="label-container">
                        <!-- İstatistikler JavaScript ile buraya çizilecek -->
                    </div>
                </div>

                <button class="btn btn-primary btn-large" onclick="resetApp()">
                    <span class="icon">🔄</span> Yeni Atık Fotoğrafla
                </button>
            </div>
        </section>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
